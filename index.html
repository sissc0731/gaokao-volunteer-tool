<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>福建省高考志愿填报2026 - 智能推荐/分数线/霍兰德测试</title><meta name="description" content="2026福建高考志愿填报系统。输入分数智能推荐冲稳保院校，标注风险等级，查询录取分数线和招生人数。"><style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--accent:#1e40af}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6}.container{max-width:860px;margin:0 auto;padding:0 14px}header{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#fff;padding:22px 0;text-align:center;position:sticky;top:0;z-index:100}header h1{font-size:1.2rem}.tabs{display:flex;background:#fff;border-bottom:2px solid #e5e7eb;position:sticky;top:62px;z-index:99;overflow-x:auto}.tab{flex:1;text-align:center;padding:10px 2px;cursor:pointer;font-size:.66rem;font-weight:600;color:#666;border-bottom:2px solid transparent;white-space:nowrap}.tab:hover{color:var(--accent)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.panel{display:none;padding:12px 0}.panel.active{display:block}.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}.card h3{font-size:.84rem;margin-bottom:6px}.row{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;align-items:center}.row label{font-size:.72rem;font-weight:600;color:#444;min-width:45px}.row select,.row input{padding:7px;border:2px solid #e5e7eb;border-radius:6px;font-size:.82rem;flex:1;min-width:80px;background:#fafafa}.row input:focus,.row select:focus{outline:none;border-color:var(--accent)}.btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer}.result{margin-top:8px;display:none}.result.show{display:block}.school-card{padding:10px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}.school-card:hover{border-color:var(--accent)}.school-card .info h4{font-size:.82rem}.school-card .info .sub{font-size:.68rem;color:#666}.school-card .score{font-weight:700;font-size:.9rem;text-align:right;min-width:50px}.school-card .risk{font-size:.64rem;padding:2px 6px;border-radius:4px;margin-left:4px}.risk-cw{background:#fef3c7;color:#92400e}.risk-wd{background:#dbeafe;color:#1e40af}.risk-bd{background:#d1fae5;color:#065f46}.tag-sm{display:inline-block;padding:1px 4px;border-radius:3px;font-size:.58rem;margin-right:2px;vertical-align:middle}.tag-cw{background:#fef3c7;color:#92400e}.tag-wd{background:#dbeafe;color:#1e40af}.tag-bd{background:#d1fae5;color:#065f46}.filters{display:flex;gap:3px;flex-wrap:wrap;margin:6px 0}.filter{padding:3px 8px;border:1px solid #e5e7eb;border-radius:12px;cursor:pointer;font-size:.64rem}.filter.active{background:var(--accent);color:#fff;border-color:var(--accent)}.table{width:100%;font-size:.66rem;border-collapse:collapse;margin-top:4px}.table th{background:#f0f5ff;padding:3px;text-align:left;font-size:.62rem}.table td{padding:3px;border-bottom:1px solid #f3f4f6}.th{background:#eff6ff;padding:8px;border-radius:6px;font-size:.7rem;margin:6px 0}.progress{height:3px;background:#e5e7eb;border-radius:2px;margin-bottom:10px}.progress .bar{height:100%;background:var(--accent);border-radius:2px;transition:.3s}footer{text-align:center;color:#999;font-size:.6rem;padding:14px}.hidden{display:none}@media(max-width:500px){.tab{font-size:.58rem}.card{padding:12px}}</style></head><body><header><h1>🎓 福建省高考志愿填报 2026</h1><p>智能推荐 · 风险标注 · 霍兰德测试</p></header><div class="tabs" id="tabs"><div class="tab active" data-tab="recommend">🎯 推荐院校</div><div class="tab" data-tab="schools">🏫 院校查询</div><div class="tab" data-tab="majorDB">📋 专业查询</div><div class="tab" data-tab="holland">🧭 霍兰德</div></div><main class="container">
<section class="panel active" id="tab-recommend"><div class="card"><h3>🎯 输入分数 · 智能推荐院校（含风险标注）</h3><div class="row"><label>科类</label><select id="subj"><option value="wl">物理类</option><option value="ls">历史类</option></select></div><div class="row"><label>分数</label><input type="number" id="sc" placeholder="输入高考分数" onkeyup="if(event.key==='Enter')recommend()"></div><div class="filters" id="tagFilters"><span class="filter active" data-tag="985">985</span><span class="filter active" data-tag="211">211</span><span class="filter active" data-tag="双一流">双一流</span></div><button class="btn" onclick="recommend()">🔍 开始推荐</button><div class="result" id="recResult"></div></div></section>
<section class="panel" id="tab-schools"><div class="card"><h3>🏫 全部院校查询</h3><div class="row"><label>科类</label><select id="sSubj"><option value="wl">物理类</option><option value="ls">历史类</option></select></div><div class="row"><label>搜索</label><input type="text" id="sSearch" placeholder="输入院校名..." oninput="listSchools()"></div><div class="filters" id="schoolFilters"><span class="filter active" data-tag="985">985</span><span class="filter active" data-tag="211">211</span><span class="filter active" data-tag="双一流">双一流</span></div><div class="result show" id="schoolList" style="max-height:450px;overflow-y:auto"></div></div></section>
<section class="panel" id="tab-majorDB"><div class="card"><h3>📋 本科专业查询</h3><div class="row"><label>门类</label><select id="mjFilter" onchange="listMajors()"><option value="all">全部</option><option value="哲学">01哲学</option><option value="经济学">02经济学</option><option value="法学">03法学</option><option value="教育学">04教育学</option><option value="文学">05文学</option><option value="历史学">06历史学</option><option value="理学">07理学</option><option value="工学">08工学</option><option value="农学">09农学</option><option value="医学">10医学</option><option value="管理学">12管理学</option><option value="艺术学">13艺术学</option><option value="交叉学科">14交叉学科</option></select></div><div class="row"><label>搜索</label><input type="text" id="majorSearch" placeholder="搜索专业..." oninput="listMajors()"></div><div class="row"><label>霍兰德</label><select id="hollandFilter" onchange="listMajors()"><option value="all">全部</option><option value="R">R</option><option value="I">I</option><option value="A">A</option><option value="S">S</option><option value="E">E</option><option value="C">C</option></select></div><div class="result show" id="majorDBList" style="max-height:450px;overflow-y:auto;font-size:.7rem"></div></div></section>
<section class="panel" id="tab-holland"><div class="card"><h3>🧭 霍兰德职业兴趣测试</h3><div class="progress"><div class="bar" id="hBar" style="width:0%"></div></div><div id="hQuestion"></div><button class="btn" id="hBtn" onclick="hNext()">开始测试（30题）</button><div id="hResult" style="display:none"></div></div></section></main><footer>福建省高考志愿填报工具 · 数据为近三年综合估算 · 以省考试院为准 🎉</footer><script>
var schools=[],schMap={};
fetch('schools.json').then(r=>r.json()).then(function(data){schools=data;data.forEach(function(s){schMap[s.n]=s});listSchools()}).catch(function(){console.log('Loading schools...')});

document.getElementById('tabs').addEventListener('click',function(e){if(!e.target.classList.contains('tab'))return;var n=e.target.dataset.tab;document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});e.target.classList.add('active');document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});document.getElementById('tab-'+n).classList.add('active');if(n==='holland'&&!hStarted)renderHQuestion()});

function tags(s){var t=[];if(s.i985)t.push('<span class="tag-sm tag-cw">985</span>');if(s.i211)t.push('<span class="tag-sm tag-wd">211</span>');if(s.syl)t.push('<span class="tag-sm tag-bd">双一流</span>');return t.join('')}

function recommend(){
  var sc=parseInt(document.getElementById('sc').value)||0,subj=document.getElementById('subj').value;
  if(!sc){alert('请输入分数');return}
  var activeTags=[];document.querySelectorAll('#tagFilters .filter.active').forEach(function(f){if(f.dataset.tag!=='all')activeTags.push(f.dataset.tag)});
  var list=[];schools.forEach(function(s){var val=s.sc[subj];if(val>0){var ok=true;activeTags.forEach(function(t){if(t==='985'&&!s.i985)ok=false;if(t==='211'&&!s.i211)ok=false;if(t==='双一流'&&!s.syl)ok=false});if(ok)list.push({n:s.n,c:s.c,t:s.t,sc:val,diff:sc-val,i985:s.i985,i211:s.i211,syl:s.syl,enrl:s.enrl[subj]||0})}});list.sort(function(a,b){return b.sc-a.sc});
  var cw=[],wd=[],bd=[];list.forEach(function(s){if(s.diff>=-5&&s.diff<=15)cw.push(s);else if(s.diff>=-40&&s.diff<-5)wd.push(s);else if(s.diff>=-80&&s.diff<-40)bd.push(s)});
  var html='<p style="font-size:.76rem;color:#666;margin-top:6px">📍 福建省 · <b>'+sc+'分</b> · 共匹配 <b>'+list.length+'</b> 所院校</p>';
  function r(arr,title,riskClass,riskLabel){if(!arr.length)return;html+='<div style="margin-top:8px"><b style="font-size:.76rem;color:#666">'+title+' ('+arr.length+'所)</b>';arr.forEach(function(s){html+='<div class="school-card"><div class="info"><h4>'+s.n+' '+tags(s)+'</h4><div class="sub">'+s.c+' · ~'+s.sc+'分'+(s.enrl>0?' · 招'+s.enrl+'人':'')+'</div></div><div class="score">'+(s.diff>=0?'+':'')+s.diff+'<br><span class="risk '+riskClass+'">'+riskLabel+'</span></div></div>'});html+='</div>'}
  r(cw,'🔴 冲一冲（+15~-5分）','risk-cw','冲刺');r(wd,'🟡 稳一稳（-5~-40分）','risk-wd','稳妥');r(bd,'🟢 保一保（-40~-80分）','risk-bd','保底');
  html+='<p style="font-size:.6rem;color:#999;margin-top:6px">冲=有风险可能差几分 | 稳=大概率能上 | 保=一定能上。建议各选2-4所</p>';
  document.getElementById('recResult').innerHTML=html;document.getElementById('recResult').className='result show';
}
document.getElementById('tagFilters').addEventListener('click',function(e){if(!e.target.classList.contains('filter'))return;var t=e.target.dataset.tag;if(t==='all'){document.querySelectorAll('#tagFilters .filter').forEach(function(f){f.classList.toggle('active')})}else{e.target.classList.toggle('active');document.querySelector('#tagFilters .filter[data-tag=all]')?.classList.remove('active')}});

function listSchools(){var s=document.getElementById('sSubj').value,q=(document.getElementById('sSearch').value||'').toLowerCase();var activeTags=[];document.querySelectorAll('#schoolFilters .filter.active').forEach(function(f){if(f.dataset.tag!=='all')activeTags.push(f.dataset.tag)});var list=schools.filter(function(sc){return sc.sc[s]>0&&(!q||sc.n.includes(q))});if(activeTags.length>0){list=list.filter(function(sc){return activeTags.some(function(t){return(t==='985'&&sc.i985)||(t==='211'&&sc.i211)||(t==='双一流'&&sc.syl)})})}list.sort(function(a,b){return b.sc[s]-a.sc[s]});var html='<p style="font-size:.72rem;color:#666">共 <b>'+list.length+'</b> 所院校</p>';list.forEach(function(sc){html+='<div class="school-card"><div class="info"><h4>'+sc.n+' '+tags(sc)+'</h4><div class="sub">'+sc.c+' · ~'+sc.sc[s]+'分 · 招'+(sc.enrl[s]||0)+'人</div></div><div class="score">'+sc.sc[s]+'</div></div>'});document.getElementById('schoolList').innerHTML=html}
document.getElementById('schoolFilters').addEventListener('click',function(e){if(!e.target.classList.contains('filter'))return;var t=e.target.dataset.tag;if(t==='all'){document.querySelectorAll('#schoolFilters .filter').forEach(function(f){f.classList.toggle('active')})}else{e.target.classList.toggle('active')}listSchools()});

// Major DB
var majorDB=[{n:'哲学',c:'哲学',h:'I'},{n:'逻辑学',c:'哲学',h:'I'},{n:'经济学',c:'经济学',h:'E'},{n:'金融学',c:'经济学',h:'E'},{n:'国际经济与贸易',c:'经济学',h:'E'},{n:'财政学',c:'经济学',h:'C'},{n:'税收学',c:'经济学',h:'C'},{n:'法学',c:'法学',h:'E'},{n:'政治学',c:'法学',h:'E'},{n:'社会学',c:'法学',h:'S'},{n:'社会工作',c:'法学',h:'S'},{n:'思想政治教育',c:'法学',h:'S'},{n:'教育学',c:'教育学',h:'S'},{n:'学前教育',c:'教育学',h:'S'},{n:'小学教育',c:'教育学',h:'S'},{n:'特殊教育',c:'教育学',h:'S'},{n:'体育教育',c:'教育学',h:'R'},{n:'汉语言文学',c:'文学',h:'A'},{n:'英语',c:'文学',h:'S'},{n:'新闻学',c:'文学',h:'A'},{n:'广告学',c:'文学',h:'A'},{n:'网络与新媒体',c:'文学',h:'A'},{n:'历史学',c:'历史学',h:'I'},{n:'考古学',c:'历史学',h:'R'},{n:'数学',c:'理学',h:'I'},{n:'物理学',c:'理学',h:'I'},{n:'化学',c:'理学',h:'I'},{n:'生物科学',c:'理学',h:'I'},{n:'心理学',c:'理学',h:'S'},{n:'统计学',c:'理学',h:'C'},{n:'机械工程',c:'工学',h:'R'},{n:'车辆工程',c:'工学',h:'R'},{n:'材料科学与工程',c:'工学',h:'I'},{n:'能源与动力工程',c:'工学',h:'R'},{n:'电气工程',c:'工学',h:'R'},{n:'电子信息工程',c:'工学',h:'R'},{n:'通信工程',c:'工学',h:'R'},{n:'微电子',c:'工学',h:'R'},{n:'自动化',c:'工学',h:'R'},{n:'计算机科学与技术',c:'工学',h:'I'},{n:'软件工程',c:'工学',h:'I'},{n:'信息安全',c:'工学',h:'I'},{n:'物联网工程',c:'工学',h:'I'},{n:'人工智能',c:'工学',h:'I'},{n:'数据科学',c:'工学',h:'I'},{n:'土木工程',c:'工学',h:'R'},{n:'建筑学',c:'工学',h:'A'},{n:'化学工程',c:'工学',h:'R'},{n:'环境工程',c:'工学',h:'R'},{n:'食品科学',c:'工学',h:'R'},{n:'生物工程',c:'工学',h:'I'},{n:'农学',c:'农学',h:'R'},{n:'园艺',c:'农学',h:'R'},{n:'动物医学',c:'农学',h:'R'},{n:'园林',c:'农学',h:'A'},{n:'临床医学',c:'医学',h:'I'},{n:'口腔医学',c:'医学',h:'R'},{n:'预防医学',c:'医学',h:'I'},{n:'中医学',c:'医学',h:'S'},{n:'药学',c:'医学',h:'I'},{n:'护理学',c:'医学',h:'S'},{n:'工商管理',c:'管理学',h:'E'},{n:'市场营销',c:'管理学',h:'E'},{n:'会计学',c:'管理学',h:'C'},{n:'财务管理',c:'管理学',h:'C'},{n:'人力资源管理',c:'管理学',h:'S'},{n:'物流管理',c:'管理学',h:'C'},{n:'电子商务',c:'管理学',h:'E'},{n:'旅游管理',c:'管理学',h:'S'},{n:'行政管理',c:'管理学',h:'C'},{n:'音乐学',c:'艺术学',h:'A'},{n:'美术学',c:'艺术学',h:'A'},{n:'设计学',c:'艺术学',h:'A'},{n:'数字媒体艺术',c:'艺术学',h:'A'},{n:'集成电路',c:'交叉学科',h:'R'},{n:'国家安全学',c:'交叉学科',h:'C'},{n:'碳中和',c:'交叉学科',h:'I'}];
function listMajors(){var mj=document.getElementById('mjFilter').value,q=(document.getElementById('majorSearch').value||'').toLowerCase(),hf=document.getElementById('hollandFilter').value;var list=majorDB.filter(function(m){return(mj==='all'||m.c===mj)&&(!q||m.n.includes(q))&&(hf==='all'||m.h===hf)});var html='<p style="margin-bottom:4px;font-size:.7rem;color:#666">共 <b>'+list.length+'</b> 个</p><table class="table"><tr><th>专业</th><th>门类</th><th>霍兰德</th></tr>';list.forEach(function(m){html+='<tr><td>'+m.n+'</td><td>'+m.c+'</td><td style="font-weight:700;color:var(--accent)">'+m.h+'</td></tr>'});html+='</table>';document.getElementById('majorDBList').innerHTML=html}listMajors();

var hQs=[{q:'喜欢动手组装或修理东西',d:'R'},{q:'喜欢户外工作或活动',d:'R'},{q:'对操作机械和工具有兴趣',d:'R'},{q:'喜欢做具体看得见成果的事',d:'R'},{q:'对运动或体能活动有兴趣',d:'R'},{q:'喜欢解决复杂的数学或科学问题',d:'I'},{q:'喜欢独自思考和研究问题',d:'I'},{q:'对探索新知识和理论有兴趣',d:'I'},{q:'喜欢做实验和分析数据',d:'I'},{q:'喜欢阅读科普书籍或文章',d:'I'},{q:'喜欢绘画写作音乐等艺术创作',d:'A'},{q:'经常有新的创意和想法',d:'A'},{q:'喜欢不受约束地做事情',d:'A'},{q:'对美感色彩和形式比较敏感',d:'A'},{q:'喜欢用不同方式表达自己的想法',d:'A'},{q:'喜欢帮助别人解决问题',d:'S'},{q:'善于倾听和理解他人的感受',d:'S'},{q:'喜欢参与团队合作和集体活动',d:'S'},{q:'对教育和培训工作有兴趣',d:'S'},{q:'比较关注社会问题和公益事业',d:'S'},{q:'喜欢在人群中成为主导者',d:'E'},{q:'善于说服别人接受我的观点',d:'E'},{q:'喜欢竞争和挑战',d:'E'},{q:'对商业和赚钱有兴趣',d:'E'},{q:'乐于承担风险和做决策',d:'E'},{q:'喜欢按照规则和流程做事',d:'C'},{q:'注重细节和准确性',d:'C'},{q:'喜欢整理文件和数据',d:'C'},{q:'做事有计划并按部就班',d:'C'},{q:'在工作中追求秩序和稳定',d:'C'}];
var hScores={R:0,I:0,A:0,S:0,E:0,C:0},hAns=[],hCur=0,hStarted=false;
var hTypes={R:{n:'现实型',color:'#f97316',desc:'动手能力是你的天赋。喜欢看得见摸得着的成果，务实踏实。',mj:['机械工程','电气工程','土木工程','车辆工程','建筑学','农学','动物医学']},I:{n:'研究型',color:'#2563eb',desc:'对世界充满好奇，喜欢探究事物原理。享受独自思考和解决问题。',mj:['数学','物理学','化学','临床医学','药学','计算机科学','数据科学']},A:{n:'艺术型',color:'#ec4899',desc:'对美有敏锐感知，渴望自由表达。创造力是你最大的财富。',mj:['艺术设计','音乐学','戏剧影视','建筑学','工业设计','文学','新闻传播']},S:{n:'社会型',color:'#059669',desc:'能敏锐察觉他人情绪，擅长倾听和共情。帮助别人成长给你最大满足。',mj:['教育学','心理学','社会学','护理学','人力资源管理','法学','临床医学']},E:{n:'企业型',color:'#d97706',desc:'喜欢影响他人，对机会有敏锐嗅觉。天生懂得调动资源。',mj:['工商管理','市场营销','金融学','经济学','法学','工程管理','电子商务']},C:{n:'常规型',color:'#6366f1',desc:'做事有条不紊，注重细节和准确性。喜欢稳定可预期的环境。',mj:['会计学','审计学','财务管理','统计学','行政管理','物流管理']}};
function renderHQuestion(){if(hCur>=hQs.length){showHResult();return}hStarted=true;var q=hQs[hCur],o=['非常不符合','不太符合','一般','比较符合','非常符合'];var h='<p style="font-size:.8rem;font-weight:600;margin-bottom:6px">'+(hCur+1)+'/30. '+q.q+'</p><div style="display:flex;gap:4px;flex-wrap:wrap">';o.forEach(function(op,i){h+='<span style="flex:1;text-align:center;padding:8px 2px;border:2px solid '+(hAns[hCur]===i?'var(--accent)':'#e5e7eb')+';border-radius:8px;cursor:pointer;font-size:.66rem;min-width:48px;'+(hAns[hCur]===i?'background:var(--accent);color:#fff;font-weight:600':'')+'" onclick="hSel('+i+')">'+op+'</span>'});h+='</div>';document.getElementById('hQuestion').innerHTML=h;document.getElementById('hBar').style.width=(hCur/hQs.length*100)+'%';document.getElementById('hBtn').textContent=hCur===0?'开始答题':hCur===29?'查看结果':'下一题';document.getElementById('hBtn').disabled=typeof hAns[hCur]==='undefined';document.getElementById('hBtn').style.opacity=typeof hAns[hCur]==='undefined'?'0.4':'1'}
function hSel(i){hAns[hCur]=i;renderHQuestion();document.getElementById('hBtn').disabled=false;document.getElementById('hBtn').style.opacity='1'}
function hNext(){if(typeof hAns[hCur]==='undefined')return;if(hCur>0)hScores[hQs[hCur-1].d]+=hAns[hCur-1];hCur++;renderHQuestion()}
function showHResult(){hScores[hQs[29].d]+=hAns[29];var sr=Object.entries(hScores).sort(function(a,b){return b[1]-a[1]}),t1=hTypes[sr[0][0]],t2=hTypes[sr[1][0]],code=sr[0][0]+sr[1][0]+sr[2][0],max=sr[0][1];var h='<div style="text-align:center;padding:10px 0"><div style="font-size:2.5rem;font-weight:900;color:'+t1.color+';letter-spacing:4px">'+code+'</div><div style="font-size:.9rem;color:'+t1.color+'">'+t1.n+'</div></div>';h+='<div class="th">💬 '+t1.desc+'</div>';h+='<div class="th"><strong>匹配专业：</strong>';t1.mj.forEach(function(m){h+='<span style="display:inline-block;padding:3px 8px;margin:2px;background:#eff6ff;border-radius:5px;font-size:.7rem">'+m+'</span>'});h+='</div>';h+='<p style="font-size:.65rem;color:#666">次类型：<b>'+t2.n+'</b></p><button class="btn" onclick="hCur=0;hAns=[];hScores={R:0,I:0,A:0,S:0,E:0,C:0};hStarted=false;document.getElementById(\'hResult\').style.display=\'none\';document.getElementById(\'hQuestion\').style.display=\'block\';document.getElementById(\'hBtn\').style.display=\'block\';renderHQuestion()" style="margin-top:6px">🔄 重新测试</button>';document.getElementById('hResult').innerHTML=h;document.getElementById('hResult').style.display='block';document.getElementById('hQuestion').style.display='none';document.getElementById('hBtn').style.display='none'}
</script></body></html>
