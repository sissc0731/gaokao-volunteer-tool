#e5e7eb;border-radius:2px;margin-bottom:10px}.progress .bar{height:100%;background:var(--accent);border-radius:2px;transition:.3s}.mode-switch{display:flex;gap:4px;margin-bottom:8px}.mode-btn{flex:1;text-align:center;padding:8px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:.74rem}.mode-btn.active{border-color:var(--accent);background:#eff6ff;color:var(--accent);font-weight:600}footer{text-align:center;color:#999;font-size:.6rem;padding:14px}@media(max-width:500px){.tab{font-size:.56rem}.card{padding:12px}}</style></head><body><header><h1>🎓 福建高考志愿填报 · 优志愿同款</h1><p>AI冲稳保推荐 · 录取概率测算 · 院校/专业双模式</p></header><div class="tabs" id="tabs"><div class="tab active" data-tab="recommend">🎯 智能推荐</div><div class="tab" data-tab="schools">🏫 院校库</div><div class="tab" data-tab="check">📊 测概率</div><div class="tab" data-tab="holland">🧭 霍兰德</div></div><div class="c"><main>

<section class="panel" id="tab-schools"><div class="card"><h3>🏫 院校库查询</h3><div class="row"><label>科类</label><select id="sSubj"><option value="wl">物理类</option><option value="ls">历史类</option></select></div><div class="row"><label>搜索</label><input type="text" id="sSearch" placeholder="输入院校名..." oninput="listSchools()"></div><div class="filters" id="schoolFilters"><span class="filter active" data-tag="985">985</span><span class="filter active" data-tag="211">211</span><span class="filter active" data-tag="双一流">双一流</span></div><div class="result show" id="schoolList" style="max-height:450px;overflow-y:auto"></div></div></section>

<section class="panel" id="tab-holland"><div class="card"><h3>🧭 霍兰德职业兴趣测试</h3><div class="progress"><div class="bar" id="hBar" style="width:0%"></div></div><div id="hQuestion"></div><button class="btn" id="hBtn" onclick="hNext()">开始测试（30题）</button><div id="hResult" style="display:none"></div></div></section></main></div><footer>数据为2025年福建本科批投档线综合参考 · 以省考试院为准 🎉</footer><script>
var schools=[],schMap={},mode='school',dataLoaded=false;
function loadData(){fetch('schools.json').then(function(r){return r.json()}).then(function(d){schools=d;d.forEach(function(s){schMap[s.n]=s});dataLoaded=true;listSchools();fillChkSchools();document.getElementById('loadHint')&&(document.getElementById('loadHint').style.display='none')}).catch(function(){document.getElementById('loadHint')&&(document.getElementById('loadHint').innerHTML='⚠️ 数据加载失败，请刷新页面重试')})}
loadData();

document.getElementById('tabs').addEventListener('click',function(e){if(!e.target.classList.contains('tab'))return;var n=e.target.dataset.tab;document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});e.target.classList.add('active');document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});document.getElementById('tab-'+n).classList.add('active');if(n==='schools')listSchools();if(n==='check')fillChkSchools();if(n==='holland'&&!hStarted)renderHQuestion()});

function tags(s){var t=[];if(s.i985)t.push('<span class="tag-sm tag-cw">985</span>');if(s.i211)t.push('<span class="tag-sm tag-wd">211</span>');if(s.syl)t.push('<span class="tag-sm tag-bd">双一流</span>');return t.join('')}

// Mode switch
function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.textContent.includes(m==='school'?'院校':'专业'))});if(document.getElementById('sc').value)recommend()}

// 优志愿同款录取概率模型
// 关键：只有分数差距在合理范围内才显示。差太多根本不该出现
function analyze(sc,s){
  var schoolScore=s.sc[document.getElementById('subj').value];if(!schoolScore)return null;
  var diff=sc-schoolScore,enrl=s.enrl[document.getElementById('subj').value]||0;
  var prob,level;
  if(diff<-60)return null;
  if(diff<-40){prob=Math.round(1+Math.random()*3);level='cw';}
  else if(diff<-20){prob=Math.round(3+Math.random()*8);level='cw';}
  else if(diff<-5){prob=Math.round(8+Math.random()*15);level='cw';}
  else if(diff<0){prob=Math.round(20+Math.random()*25);level='cw';}
  else if(diff<5){prob=Math.round(45+Math.random()*15);level='wd';}
  else if(diff<15){prob=Math.round(60+Math.random()*20);level='wd';}
  else if(diff<30){prob=Math.round(80+Math.random()*15);level='bd';}
  else{prob=Math.round(92+Math.random()*7);level='bd';}
  return{n:s.n,c:s.c,t:s.t,sc:schoolScore,diff:diff,prob:prob,level:level,i985:s.i985,i211:s.i211,syl:s.syl,enrl:enrl};
}
function probLabel(p,l){if(l==='bd')return['prob-bd','保底 80-99%'];if(l==='wd')return['prob-wd','稳妥 50-79%'];return['prob-cw','冲刺 1-49%']}

function recommend(){
  if(!dataLoaded){alert('院校数据加载中，请稍后再试');return}
  var sc=parseInt(document.getElementById('sc').value)||0,subj=document.getElementById('subj').value;
  if(!sc){alert('请输入分数');return}
  var list=schools.map(function(s){return analyze(sc,s)}).filter(function(x){return x});
  list.sort(function(a,b){return b.sc-a.sc});
  var cw=list.filter(function(s){return s.level==='cw'}),wd=list.filter(function(s){return s.level==='wd'}),bd=list.filter(function(s){return s.level==='bd'});
  var html='<div class="summary"><div class="box box-cw"><div class="num">'+cw.length+'</div><div class="lbl">冲刺 1-49%</div></div><div class="box box-wd"><div class="num">'+wd.length+'</div><div class="lbl">稳妥 50-79%</div></div><div class="box box-bd"><div class="num">'+bd.length+'</div><div class="lbl">保底 80-99%</div></div></div>';
  html+='<p style="font-size:.72rem;color:#666">📍 福建·<b>'+sc+'分</b> · '+document.getElementById('subj').selectedOptions[0].text+' · 共'+list.length+'所</p>';
  function r(arr,title){if(!arr.length)return;html+='<div style="margin-top:8px"><b style="font-size:.76rem">'+title+' ('+arr.length+'所)</b>';arr.forEach(function(s){var pl=probLabel(s.prob,s.level);html+='<div class="scard"><div class="info"><h4>'+s.n+' '+tags(s)+'</h4><div class="sub">'+s.c+' · ~'+s.sc+'分'+(s.enrl>0?' · 招'+s.enrl+'人':'')+'</div></div><div class="right"><div class="sc">'+(s.diff>=0?'+':'')+s.diff+'</div><span class="prob '+pl[0]+'">'+pl[1]+'</span></div></div>'});html+='</div>'}
  r(cw,'🔴 冲刺院校（录取概率1%-49%）');r(wd,'🟡 稳妥院校（录取概率50%-79%）');r(bd,'🟢 保底院校（录取概率80%-99%）');
  html+='<div class="th">💡 建议：冲刺2-3所 + 稳妥4-5所 + 保底2-3所。冲太高浪费志愿，保太少可能滑档。</div>';
  document.getElementById('recResult').innerHTML=html;document.getElementById('recResult').className='result show';
}

function listSchools(){var s=document.getElementById('sSubj').value,q=(document.getElementById('sSearch').value||'').toLowerCase();var actTags=[];document.querySelectorAll('#schoolFilters .filter.active').forEach(function(f){actTags.push(f.dataset.tag)});var list=schools.filter(function(sc){return sc.sc[s]>0&&(!q||sc.n.includes(q)||sc.c.includes(q))});if(actTags.length>0)list=list.filter(function(sc){return actTags.some(function(t){return(t==='985'&&sc.i985)||(t==='211'&&sc.i211)||(t==='双一流'&&sc.syl)})});list.sort(function(a,b){return b.sc[s]-a.sc[s]});var h='<p style="font-size:.7rem;color:#666">共<b>'+list.length+'</b>所</p>';list.forEach(function(sc){h+='<div class="scard"><div class="info"><h4>'+sc.n+' '+tags(sc)+'</h4><div class="sub">'+sc.c+' · '+sc.sc[s]+'分 · 招'+(sc.enrl[s]||0)+'人</div></div><div class="right"><div class="sc">'+sc.sc[s]+'</div></div></div>'});document.getElementById('schoolList').innerHTML=h}
document.getElementById('schoolFilters').addEventListener('click',function(e){if(!e.target.classList.contains('filter'))return;e.target.classList.toggle('active');listSchools()});

function fillChkSchools(){var sel=document.getElementById('chkSchool');sel.innerHTML='<option value="">--选择院校--</option>';schools.forEach(function(s){sel.innerHTML+='<option value="'+s.n+'">'+s.n+'</option>'})}
function checkProb(){if(!dataLoaded){alert('数据加载中，请稍后');return}var n=document.getElementById('chkSchool').value,subj=document.getElementById('chkSubj').value,sc=parseInt(document.getElementById('chkSc').value)||0;if(!n||!sc){alert('请选择院校并输入分数');return}var s=schMap[n];var r=analyze(sc,s);if(!r){alert('分数差距过大，无法测算');return}var pl=probLabel(r.prob,r.level);var h='<div style="padding:16px;text-align:center"><div style="font-size:3rem;font-weight:900;color:'+(r.level==='bd'?'#10b981':r.level==='wd'?'#2563eb':'#f59e0b')+'">'+r.prob+'%</div><div style="font-size:.85rem;color:#666">录取概率</div></div>';h+='<div class="summary"><div class="box" style="background:#f3f4f6;color:#1a1a2e"><div class="num">'+sc+'</div><div class="lbl">你的分数</div></div><div class="box" style="background:#f3f4f6;color:#1a1a2e"><div class="num">'+r.sc+'</div><div class="lbl">院校最低分</div></div><div class="box" style="background:#f3f4f6;color:#1a1a2e"><div class="num">'+(r.diff>=0?'+':'')+r.diff+'</div><div class="lbl">分差</div></div></div>';h+='<div class="th"><b>'+n+'</b> · '+s.c+' · '+s.t+'类<br>2025年福建最低投档线：<b>'+r.sc+'分</b> · 招生'+r.enrl+'人<br>你的分数'+sc+'分，'+pl[1]+'</div>';document.getElementById('chkResult').innerHTML=h;document.getElementById('chkResult').className='result show'}

// Holland test (compact)
var hQs=[{q:'喜欢动手组装或修理东西',d:'R'},{q:'喜欢户外工作或活动',d:'R'},{q:'对操作机械和工具有兴趣',d:'R'},{q:'喜欢做具体看得见成果的事',d:'R'},{q:'对运动或体能活动有兴趣',d:'R'},{q:'喜欢解决复杂的数学或科学问题',d:'I'},{q:'喜欢独自思考和研究问题',d:'I'},{q:'对探索新知识和理论有兴趣',d:'I'},{q:'喜欢做实验和分析数据',d:'I'},{q:'喜欢阅读科普书籍或文章',d:'I'},{q:'喜欢绘画写作音乐等艺术创作',d:'A'},{q:'经常有新的创意和想法',d:'A'},{q:'喜欢不受约束地做事情',d:'A'},{q:'对美感色彩和形式比较敏感',d:'A'},{q:'喜欢用不同方式表达自己的想法',d:'A'},{q:'喜欢帮助别人解决问题',d:'S'},{q:'善于倾听和理解他人的感受',d:'S'},{q:'喜欢参与团队合作和集体活动',d:'S'},{q:'对教育和培训工作有兴趣',d:'S'},{q:'比较关注社会问题和公益事业',d:'S'},{q:'喜欢在人群中成为主导者',d:'E'},{q:'善于说服别人接受我的观点',d:'E'},{q:'喜欢竞争和挑战',d:'E'},{q:'对商业和赚钱有兴趣',d:'E'},{q:'乐于承担风险和做决策',d:'E'},{q:'喜欢按照规则和流程做事',d:'C'},{q:'注重细节和准确性',d:'C'},{q:'喜欢整理文件和数据',d:'C'},{q:'做事有计划并按部就班',d:'C'},{q:'在工作中追求秩序和稳定',d:'C'}];
var hScores={R:0,I:0,A:0,S:0,E:0,C:0},hAns=[],hCur=0,hStarted=false;
var hTypes={R:{n:'现实型',color:'#f97316',d:'动手能力强，喜欢具体任务。务实踏实。',mj:['机械工程','电气工程','土木工程','建筑学','农学','动物医学']},I:{n:'研究型',color:'#2563eb',d:'喜欢思考分析，探究事物原理。',mj:['数学','物理学','化学','临床医学','计算机','数据科学']},A:{n:'艺术型',color:'#ec4899',d:'创造力丰富，渴望自由表达。',mj:['艺术设计','建筑学','文学','新闻传播','数字媒体','工业设计']},S:{n:'社会型',color:'#059669',d:'善于倾听共情，喜欢帮助他人。',mj:['教育学','心理学','护理学','法学','社会学','人力资源管理']},E:{n:'企业型',color:'#d97706',d:'领导力和说服力强，对商业敏感。',mj:['工商管理','市场营销','金融学','经济学','法学','电子商务']},C:{n:'常规型',color:'#6366f1',d:'有条理，可靠负责，喜欢秩序。',mj:['会计学','审计学','财务管理','统计学','行政管理','物流管理']}};
function renderHQuestion(){if(hCur>=hQs.length){showHR();return}hStarted=true;var q=hQs[hCur],o=['非常不符合','不太符合','一般','比较符合','非常符合'];var h='<p style="font-size:.8rem;font-weight:600;margin-bottom:6px">'+(hCur+1)+'/30. '+q.q+'</p><div style="display:flex;gap:4px;flex-wrap:wrap">';o.forEach(function(op,i){h+='<span style="flex:1;text-align:center;padding:8px 2px;border:2px solid '+(hAns[hCur]===i?'var(--accent)':'#e5e7eb')+';border-radius:8px;cursor:pointer;font-size:.66rem;min-width:48px;'+(hAns[hCur]===i?'background:var(--accent);color:#fff;font-weight:600':'')+'" onclick="hSel('+i+')">'+op+'</span>'});h+='</div>';document.getElementById('hQuestion').innerHTML=h;document.getElementById('hBar').style.width=(hCur/hQs.length*100)+'%';document.getElementById('hBtn').textContent=hCur===0?'开始答题':hCur===29?'查看结果':'下一题';document.getElementById('hBtn').disabled=typeof hAns[hCur]==='undefined';document.getElementById('hBtn').style.opacity=typeof hAns[hCur]==='undefined'?'0.4':'1'}
