// Base scores (Beijing WL reference) + adjustments per province
var baseS={};
Object.keys(S).forEach(function(k){var s=S[k];var b=540;if(s.i985)b=660+Math.floor(Math.random()*25);else if(s.i211)b=590+Math.floor(Math.random()*20);else b=560+Math.floor(Math.random()*30);if(s.c==='北京'||s.c==='上海')b+=8;if(s.n.includes('财经')||s.n.includes('政法'))b+=5;baseS[k]=b});

function score(k,p,s){var a=provAdj[p]||{wl:0,ls:0};return Math.round((baseS[k]||580)+(a[s]||0))}
function tags(k){var s=S[k];var t=[];if(s.i985)t.push('<span class="tag-sm tag-cw">985</span>');if(s.i211)t.push('<span class="tag-sm tag-wd">211</span>');if(s.syl)t.push('<span class="tag-sm tag-bd">双一流</span>');return t.join('')}

// Recommend
function recommend(){
  var sc=parseInt(document.getElementById('score').value)||0,p=document.getElementById('province').value,s=document.getElementById('subject').value;
  if(!sc){alert('请输入分数');return}
  var activeTags=[];document.querySelectorAll('#tagFilters .filter.active').forEach(function(f){if(f.dataset.tag!=='all')activeTags.push(f.dataset.tag)});
  var list=[];Object.keys(S).forEach(function(k){var sc2=score(k,p,s);if(sc2>0){var ok=true;if(activeTags.length>0){activeTags.forEach(function(t){if(t==='985'&&!S[k].i985)ok=false;if(t==='211'&&!S[k].i211)ok=false;if(t==='双一流'&&!S[k].syl)ok=false})}if(ok)list.push({id:k,score:sc2,diff:sc-sc2})}});list.sort(function(a,b){return b.score-a.score});
  var cw=[],wd=[],bd=[];
  list.forEach(function(si){if(si.diff>=-5&&si.diff<=15)cw.push(si);else if(si.diff>=-40&&si.diff<-5)wd.push(si);else if(si.diff>=-80&&si.diff<-40)bd.push(si)});
  var html='<div class="inline-stat">📌 <b>'+sc+'分</b></div><div class="inline-stat">📍 '+document.getElementById('province').selectedOptions[0].text+'</div><div class="inline-stat">📖 '+document.getElementById('subject').selectedOptions[0].text+'</div>';
  function r(arr,t,cls){if(!arr.length)return;html+='<div style="margin-top:12px"><h4 style="font-size:.8rem;margin-bottom:6px;color:#666">'+t+' ('+arr.length+'所)</h4>';arr.forEach(function(si){var ss=S[si.id];html+='<div class="school-card"><div class="info"><h4>'+ss.n+' '+tags(si.id)+'</h4><div class="sub">'+ss.c+' · '+ss.t+'类 · 最低约<b>'+si.score+'</b>分 · 位次约<b>'+(Math.round(Math.exp((720-si.score)/80)*10000)).toLocaleString()+'</b></div></div><div class="score">'+(si.diff>=0?'+':'')+si.diff+'<div class="trend">分差</div></div></div>'})});html+='</div>'}
  r(cw,'🔴 冲一冲（-5~+15分）');r(wd,'🟡 稳一稳（-40~-5分）');r(bd,'🟢 保一保（-80~-40分）');
  html+='<div class="th">💡 <b>策略建议：</b>冲稳保比例建议 2:4:2。冲的不要超过2-3所，稳的选4-5所，保的2-3所即可。不要全部冲——很可能滑档。</div>';
  html+='<p style="font-size:.62rem;color:#999;margin-top:8px">* 数据为近三年最低录取分综合估算，以各省考试院公布为准</p>';
  document.getElementById('recResult').innerHTML=html;document.getElementById('recResult').className='result show';
}

var hScores={R:0,I:0,A:0,S:0,E:0,C:0},hAns=[],hCur=0,hStarted=false;
var hTypes={R:{n:'现实型 Realistic',d:'动手能力强，喜欢具体任务和实际操作。偏好户外工作，对工具/机器/动植物有亲近感。务实踏实，不喜欢空谈。',mj:['机械工程','土木工程','电气工程','车辆工程','建筑学','农学','林学','动物医学','地质工程']},I:{n:'研究型 Investigative',d:'喜欢思考分析，对科学探索充满好奇。善于独立观察和解决复杂问题。享受通过阅读和实验获取知识。',mj:['数学','物理学','化学','生物科学','统计学','临床医学','药学','计算机科学','数据科学']},A:{n:'艺术型 Artistic',d:'富有想象力和创造力，喜欢通过艺术表达自我。追求自由和美。对色彩、声音、文字有敏锐感知力。',mj:['艺术设计','音乐学','美术学','戏剧影视','建筑学','工业设计','数字媒体','文学','新闻传播']},S:{n:'社会型 Social',d:'善于交际和帮助他人。有同理心和耐心，善于倾听。重视人际关系和社会价值，乐于为他人服务。',mj:['教育学','心理学','社会学','社会工作','护理学','人力资源管理','公共管理','法学','临床医学']},E:{n:'企业型 Enterprising',d:'有领导力和说服力，喜欢影响和激励他人。对商业机会敏感，愿意承担风险。自信果断，享受竞争和挑战。',mj:['工商管理','市场营销','金融学','经济学','国际经济与贸易','会计学','法学','工程管理']},C:{n:'常规型 Conventional',d:'做事有条理，注重细节和准确性。喜欢稳定有序的环境。擅长处理数据和文档，遵循规则和流程。',mj:['会计学','审计学','财务管理','统计学','档案学','行政管理','物流管理','信息管理']}};
function renderHQuestion(){if(hCur>=hQs.length){showHResult();return}hStarted=true;var q=hQs[hCur],o=['非常不符合','不太符合','一般','比较符合','非常符合'];var h='<p style="font-size:.82rem;font-weight:600;margin-bottom:8px">'+(hCur+1)+'/30. '+q.q+'</p><div style="display:flex;gap:5px;flex-wrap:wrap">';o.forEach(function(op,i){h+='<span style="flex:1;text-align:center;padding:9px 3px;border:2px solid '+(hAns[hCur]===i?'var(--accent)':'#e5e7eb')+';border-radius:8px;cursor:pointer;font-size:.7rem;min-width:50px;'+(hAns[hCur]===i?'background:var(--accent);color:#fff;font-weight:600':'')+'" onclick="hSel('+i+')">'+op+'</span>'});h+='</div>';document.getElementById('hQuestion').innerHTML=h;document.getElementById('hBar').style.width=(hCur/hQs.length*100)+'%';document.getElementById('hBtn').textContent=hCur===0?'开始答题':hCur===29?'查看结果':'下一题';document.getElementById('hBtn').disabled=typeof hAns[hCur]==='undefined';document.getElementById('hBtn').style.opacity=typeof hAns[hCur]==='undefined'?'0.4':'1'}

function showHResult(){hScores[hQs[29].d]+=hAns[29];var sr=Object.entries(hScores).sort(function(a,b){return b[1]-a[1]});var t1=hTypes[sr[0][0]],t2=hTypes[sr[1][0]],code=sr[0][0]+sr[1][0]+sr[2][0],max=sr[0][1];var h='<div style="text-align:center;padding:12px"><div style="font-size:2.2rem;font-weight:900;color:var(--accent)">'+code+'</div><div style="font-size:.85rem;color:#666">'+t1.n+'</div>';sr.forEach(function(e){h+='<div style="display:flex;align-items:center;gap:6px;margin:3px 0;font-size:.68rem"><span style="width:16px;font-weight:700;color:var(--accent)">'+e[0]+'</span><div style="flex:1;height:14px;border-radius:7px;background:#f0f0f0"><div style="height:100%;border-radius:7px;background:var(--accent);width:'+(e[1]/max*100)+'%"></div></div><span style="width:22px;text-align:right;color:#666">'+e[1]+'</span></div>'});h+='</div><div class="th"><strong>🔍 '+t1.n+'：</strong>'+t1.d+'</div><div style="margin-top:6px"><strong>📚 匹配专业：</strong>';t1.mj.forEach(function(m){h+='<span style="display:inline-block;padding:3px 8px;margin:2px;background:#eff6ff;border-radius:5px;font-size:.74rem">'+m+'</span>'});h+='</div><p style="font-size:.7rem;color:#666;margin-top:6px">次类型：<b>'+t2.n+'</b> · '+t2.mj.slice(0,3).join('、')+'</p><button class="btn" onclick="hCur=0;hAns=[];hScores={R:0,I:0,A:0,S:0,E:0,C:0};hStarted=false;document.getElementById(\"hResult\").style.display=\"none\";document.getElementById(\"hQuestion\").style.display=\"block\";document.getElementById(\"hBtn\").style.display=\"block\";renderHQuestion()" style="margin-top:8px">🔄 重新测试</button>';document.getElementById('hResult').innerHTML=h;document.getElementById('hResult').style.display='block';document.getElementById('hQuestion').style.display='none';document.getElementById('hBtn').style.display='none'}

(function(){var ms=[{n:'计算机科学与技术',d:'就业面最广。互联网/金融/制造业都需要。名校起薪20-40万/年。核心课：数据结构、算法、OS、网络。适合数学好、喜欢解决问题的人。'},{n:'临床医学',d:'学制最长（5年本科+3年规培），但职业稳定性最高。越老越吃香。核心要求：耐心+抗压能力+持续学习意愿。三甲医生30岁后收入可观。'},{n:'电子信息工程',d:'芯片/通信/物联网方向需求旺盛。国家战略支持，未来十年确定性高。核心：电路、信号处理、电磁场、嵌入式。适合物理好+动手能力强的人。'},{n:'法学',d:'出路分两条：考公（法院/检察院）和律所。五院四系是敲门砖。需通过法考（通过率约15%）。适合逻辑强+文字功底好的人。'},{n:'金融学',d:'高薪但卷。清北复交+两财一贸是核心圈层。数学不好慎入。核心能力：数据分析+沟通+抗压。证书：CFA/CPA/FRM。'},{n:'建筑学',d:'学制5年。地产下行但顶尖院校不愁出路。需要美术基础+空间想象力。老八校（清华同济东南天大等）是金字招牌。'},{n:'机械工程',d:'传统工科基础，就业稳定。近年与机器人、自动化结合有新发展。制造业刚需，天花板看个人能力。'},{n:'会计学',d:'职业路径清晰：事务所→企业财务→CFO。CPA是职业加速器。各行各业都需要，不怕找不到工作。'},{n:'电气工程',d:'电网、新能源、电力电子方向就业极好。国家电网是最大雇主。工作稳定、待遇好、社会地位高。'},{n:'数学',d:'本科打好基础，研究生转向金融/计算机/统计/数据科学。万金油专业上限极高。前提是你是真的喜欢数学。'},{n:'数据科学',d:'新兴交叉学科，就业市场需求大。结合统计学+计算机+领域知识。各行各业都在招数据分析师。'},{n:'口腔医学',d:'比临床医学轻松，收入不低。可以自己开诊所。工作节奏相对可控。近几年分数线涨得很快。'}];var h='';ms.forEach(function(m){h+='<div style="padding:10px 0;border-bottom:1px solid #f3f4f6"><h4 style="font-size:.84rem">'+m.n+'</h4><p style="font-size:.72rem;color:#666;margin-top:2px">'+m.d+'</p></div>'});document.getElementById('majorList').innerHTML=h})();
