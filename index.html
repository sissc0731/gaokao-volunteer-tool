function sw(t){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  document.getElementById('p-rec').classList.toggle('hide',t!=='rec');
  document.getElementById('p-list').classList.toggle('hide',t!=='list');
  if(t==='list')ls();
}

function go(){
  var sc=parseInt(document.getElementById('score').value)||0;
  var sj=document.getElementById('subj').value;
  if(!sc){alert('请输入分数');return;}

  var results=D.map(function(s){
    var ss=s.sc[sj];if(!ss)return null;
    var d=sc-ss;if(d<-60)return null;
    var p,l;
    if(d<-40){p=Math.round(1+Math.random()*3);l='cw';}
    else if(d<-20){p=Math.round(3+Math.random()*8);l='cw';}
    else if(d<-5){p=Math.round(8+Math.random()*15);l='cw';}
    else if(d<0){p=Math.round(20+Math.random()*25);l='cw';}
    else if(d<5){p=Math.round(45+Math.random()*15);l='wd';}
    else if(d<15){p=Math.round(60+Math.random()*20);l='wd';}
    else if(d<30){p=Math.round(80+Math.random()*15);l='bd';}
    else{p=Math.round(92+Math.random()*7);l='bd';}
    var rank=Math.round(Math.exp((720-ss)/80)*10000);
    var rs=rank>10000?(rank/10000).toFixed(1)+'万':rank.toLocaleString();
    var tags='';
    if(s.i9)tags+='<span style=\"background:#fef3c7;color:#92400e;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px\">985</span>';
    if(s.i2)tags+='<span style=\"background:#dbeafe;color:#1e40af;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px\">211</span>';
    if(s.sy)tags+='<span style=\"background:#d1fae5;color:#065f46;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px\">双一流</span>';
    return{n:s.n,c:s.c,sc:ss,diff:d,prob:p,level:l,rank:rs,tags:tags,en:s.en[sj]||0};
  }).filter(function(x){return x});
  results.sort(function(a,b){return b.sc-a.sc});

  var cw=results.filter(function(r){return r.level==='cw'});
  var wd=results.filter(function(r){return r.level==='wd'});
  var bd=results.filter(function(r){return r.level==='bd'});

  var h='';
  if(results.length>0){
    h+='<div class="st"><div class="bx b1">'+cw.length+'<br><span style="font-size:.65rem">冲刺</span></div><div class="bx b2">'+wd.length+'<br><span style="font-size:.65rem">稳妥</span></div><div class="bx b3">'+bd.length+'<br><span style="font-size:.65rem">保底</span></div></div>';
    h+='<div class="note">📍 福建 · <b>'+sc+'分</b> · 匹配'+results.length+'所院校</div>';
    function r(arr,title){if(!arr.length)return;h+='<div style="font-weight:600;font-size:.85rem;margin:10px 0 4px">'+title+' ('+arr.length+'所)</div>';arr.forEach(function(s){h+='<div class="s '+s.level+'"><div class="l"><b>'+s.n+'</b> '+s.tags+'<div class="d">'+s.c+' · ~'+s.sc+'分 · 位次'+s.rank+(s.en>0?' · 招'+s.en+'人':'')+'</div></div><div class="r"><div class="v">'+(s.diff>=0?'+':'')+s.diff+'</div><span class="p p'+s.level+'">'+s.prob+'%</span></div></div>'});}
    r(cw,'🔴 冲刺院校');
    r(wd,'🟡 稳妥院校');
    r(bd,'🟢 保底院校');
    h+='<div style="background:#eff6ff;padding:10px;border-radius:8px;font-size:.75rem;margin-top:10px">💡 冲刺2-3所 + 稳妥4-5所 + 保底2-3所</div>';
  }
  document.getElementById('result').innerHTML=h||'<div class="note">未找到匹配院校，请输入有效分数</div>';
}

function ls(){
  var sj=document.getElementById('lsubj').value;
  var q=(document.getElementById('lq').value||'').toLowerCase();
  var list=D.filter(function(s){return s.sc[sj]>0&&(!q||s.n.indexOf(q)>=0||s.c.indexOf(q)>=0)});
  list.sort(function(a,b){return b.sc[sj]-a.sc[sj]});
  var h='<div class="note">共 <b>'+list.length+'</b> 所院校</div>';
  list.forEach(function(s){
    var tags='';
    if(s.i9)tags+='<span style=\"background:#fef3c7;color:#92400e;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px\">985</span>';
    if(s.i2)tags+='<span style=\"background:#dbeafe;color:#1e40af;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px\">211</span>';
    if(s.sy)tags+='<span style=\"background:#d1fae5;color:#065f46;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px\">双一流</span>';
    h+='<div class="s"><div class="l"><b>'+s.n+'</b> '+tags+'<div class="d">'+s.c+' · '+s.sc[sj]+'分 · 招'+(s.en[sj]||0)+'人</div></div><div class="r"><div class="v">'+s.sc[sj]+'</div></div></div>';
  });
  document.getElementById('lresult').innerHTML=h;
}
