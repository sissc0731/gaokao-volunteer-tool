// ====== TAB SWITCH ======
function showTab(t){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='list')doList();if(t==='major')doMajor();
}

// ====== RECOMMEND ======
function doRec(){
  var sc=parseInt(document.getElementById('score').value)||0;
  var subj=document.getElementById('subj').value;
  if(!sc){alert('请先输入分数');return;}

  var results=[];
  D.forEach(function(s){
    var schoolScore=s.sc[subj];
    if(!schoolScore)return;
    var diff=sc-schoolScore;
    if(diff<-60)return; // 差60分以上不显示
    var prob,level;
    if(diff<-40){prob=Math.round(1+Math.random()*3);level='cw';}
    else if(diff<-20){prob=Math.round(3+Math.random()*8);level='cw';}
    else if(diff<-5){prob=Math.round(8+Math.random()*15);level='cw';}
    else if(diff<0){prob=Math.round(20+Math.random()*25);level='cw';}
    else if(diff<5){prob=Math.round(45+Math.random()*15);level='wd';}
    else if(diff<15){prob=Math.round(60+Math.random()*20);level='wd';}
    else if(diff<30){prob=Math.round(80+Math.random()*15);level='bd';}
    else{prob=Math.round(92+Math.random()*7);level='bd';}
    results.push({n:s.n,c:s.c,sc:schoolScore,diff:diff,prob:prob,level:level,i9:s.i9,i2:s.i2,sy:s.sy,en:s.en[subj]||0});
  });
  results.sort(function(a,b){return b.sc-a.sc});
  var cw=results.filter(function(r){return r.level==='cw'});
  var wd=results.filter(function(r){return r.level==='wd'});
  var bd=results.filter(function(r){return r.level==='bd'});

  var h='';
  h+='<div class="summary"><div class="sb" style="background:#f59e0b"><div class="n">'+cw.length+'</div><div class="l">冲刺 1-49%</div></div><div class="sb" style="background:#2563eb"><div class="n">'+wd.length+'</div><div class="l">稳妥 50-79%</div></div><div class="sb" style="background:#10b981"><div class="n">'+bd.length+'</div><div class="l">保底 80-99%</div></div></div>';
  h+='<p style="font-size:.75rem;color:#666">📍 福建 · <b>'+sc+'分</b> · 匹配'+results.length+'所院校</p>';

  function render(arr,title){
    if(!arr.length)return;
    h+='<p style="font-size:.8rem;font-weight:600;margin:10px 0 4px">'+title+' ('+arr.length+'所)</p>';
    arr.forEach(function(s){
      var tags='';
      if(s.i9)tags+='<span style="background:#fef3c7;color:#92400e;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px">985</span>';
      if(s.i2)tags+='<span style="background:#dbeafe;color:#1e40af;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px">211</span>';
      if(s.sy)tags+='<span style="background:#d1fae5;color:#065f46;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px">双一流</span>';
      var estRank=Math.round(Math.exp((720-s.sc)/80)*10000);
      var rankStr=estRank>10000?(estRank/10000).toFixed(1)+'万':estRank.toLocaleString();
      var sm=[];
      if(s.t==='理工')sm=['计算机','电子信息','机械','自动化','土木'];
      else if(s.t==='综合')sm=['计算机','法学','经济','工商管理','数学'];
      else if(s.t==='师范')sm=['教育学','汉语言','数学','英语','物理'];
      else if(s.t==='医药')sm=['临床医学','口腔','药学','护理','预防医学'];
      else if(s.t==='财经')sm=['金融学','会计','经济','工商管理','统计'];
      else if(s.t==='农林')sm=['农学','园艺','动物医学','食品科学','生物'];
      else if(s.t==='语言')sm=['英语','翻译','商务英语','日语','新闻'];
      else if(s.t==='政法')sm=['法学','侦查学','治安学','政治学','社会学'];
      else sm=['计算机','英语','工商管理','会计','法学'];
      h+='<div class="scard '+s.level+'"><div class="l"><h4>'+s.n+' '+tags+'</h4><div class="sub">'+s.c+' · '+s.t+'类 · ~'+s.sc+'分 · 位次约<b>'+rankStr+'</b>'+(s.en>0?' · 招<b>'+s.en+'</b>人':'')+'<br>🏷 优势方向：'+sm.join('、')+'</div></div><div class="r"><div class="s">'+(s.diff>=0?'+':'')+s.diff+'</div><div class="p p'+s.level+'">'+s.prob+'%</div></div></div>';
    });
  }
  render(cw,'🔴 冲刺院校');
  render(wd,'🟡 稳妥院校');
  render(bd,'🟢 保底院校');
  h+='<div style="background:#eff6ff;padding:10px;border-radius:8px;font-size:.7rem;margin-top:10px">💡 冲刺2-3所 + 稳妥4-5所 + 保底2-3所。冲太高浪费志愿，保太少可能滑档。</div>';
  document.getElementById('recResult').innerHTML=h;
}

// ====== SCHOOL LIST ======
function doList(){
  var s=document.getElementById('sSubj').value;
  var q=(document.getElementById('sSearch').value||'').toLowerCase();
  var list=D.filter(function(sc){return sc.sc[s]>0&&(!q||sc.n.includes(q)||sc.c.includes(q))});
  list.sort(function(a,b){return b.sc[s]-a.sc[s]});
  var h='<p style="font-size:.75rem;color:#666">共<b>'+list.length+'</b>所</p>';
  list.forEach(function(sc){
    var tags='';
    if(sc.i9)tags+='<span style="background:#fef3c7;color:#92400e;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px">985</span>';
    if(sc.i2)tags+='<span style="background:#dbeafe;color:#1e40af;font-size:.55rem;padding:1px 3px;border-radius:3px;margin:0 1px">211</span>';
    h+='<div class="scard"><div class="l"><h4>'+sc.n+' '+tags+'</h4><div class="sub">'+sc.c+' · '+sc.sc[s]+'分 · 招'+(sc.en[s]||0)+'人</div></div><div class="r"><div class="s">'+sc.sc[s]+'</div></div></div>';
  });
  document.getElementById('listResult').innerHTML=h;
}

// ====== MAJOR LIST ======
function doMajor(){
  var cat=document.getElementById('mjCat').value,q=(document.getElementById('mjSearch').value||'').toLowerCase(),hl=document.getElementById('mjHL').value;
  var list=M.filter(function(m){return(cat==='all'||m.c===cat)&&(!q||m.n.indexOf(q)>=0)&&(hl==='all'||m.h===hl)});
  var h='<p style="font-size:.75rem;color:#666;margin:10px 0">共 <b>'+list.length+'</b> 个专业</p><div style="max-height:400px;overflow-y:auto">';
  var cats={};
  list.forEach(function(m){if(!cats[m.c])cats[m.c]=[];cats[m.c].push(m)});
  Object.keys(cats).forEach(function(c){
    h+='<p style="font-size:.8rem;font-weight:600;margin:8px 0 4px;color:#2563eb">'+c+' ('+cats[c].length+')</p>';
    cats[c].forEach(function(m){h+='<span style="display:inline-block;padding:3px 8px;margin:2px;background:#eff6ff;border-radius:4px;font-size:.7rem">'+m.n+'</span>'});
  });
  h+='</div>';
  document.getElementById('majorResult').innerHTML=h;
}
