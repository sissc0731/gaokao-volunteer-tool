// Recommend
function recommend(){
  var sc=parseInt(document.getElementById('score').value)||0,p=document.getElementById('province').value,s=document.getElementById('subject').value;
  if(!sc){alert('请输入分数');return}
  var activeTags=[];document.querySelectorAll('#tagFilters .filter.active').forEach(function(f){if(f.dataset.tag!=='all')activeTags.push(f.dataset.tag)});
  var list=[];Object.keys(S).forEach(function(k){var sc2=score(k,p,s);if(sc2>0){var ok=true;if(activeTags.length>0){activeTags.forEach(function(t){if(t==='985'&&!S[k].i985)ok=false;if(t==='211'&&!S[k].i211)ok=false;if(t==='双一流'&&!S[k].syl)ok=false})}if(ok)list.push({id:k,score:sc2,diff:sc-sc2})}});list.sort(function(a,b){return b.score-a.score});
  var cw=[],wd=[],bd=[];
