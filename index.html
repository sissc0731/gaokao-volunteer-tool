// Score reference (bj/wl is the baseline, other provinces scaled)
var sBase={};
Object.keys(schools).forEach(function(k){
  var s=schools[k];var b=0;
  if(s.i985&&s.i211)b=660;else if(s.i211)b=590;else b=540;

function getScore(k,p,s){var base=sBase[k];var adj={bj:{wl:0,ls:-6},sh:{wl:-65,ls:-63},gd:{wl:10,ls:-22},zj:{wl:20,ls:12},js:{wl:-4,ls:-24},sc:{wl:8,ls:-14},hb:{wl:2,ls:-18},sd:{wl:6,ls:-12},hn:{wl:12,ls:-8},fj:{wl:4,ls:-20},ln:{wl:0,ls:-16},cq:{wl:-2,ls:-20},sx:{wl:-4,ls:-22},ah:{wl:0,ls:-18}};var a=adj[p]||{wl:0,ls:0};return Math.round(base+(a[s]||0))}
function getTags(s){var t=[];if(s.i985)t.push('<span class="tag-sm tag-cw">985</span>');if(s.i211)t.push('<span class="tag-sm tag-wd">211</span>');if(s.syl)t.push('<span class="tag-sm tag-bd">双一流</span>');return t.join('')}

// Recommend
function recommend(){
  var score=parseInt(document.getElementById('score').value)||0,p=document.getElementById('province').value,s=document.getElementById('subject').value;
  if(!score){alert('请输入分数');return}
  var list=[];Object.keys(schools).forEach(function(k){var sc=getScore(k,p,s);if(sc>0)list.push({id:k,score:sc,diff:score-sc})});list.sort(function(a,b){return b.score-a.score});
  var cw=[],wd=[],bd=[];
  list.forEach(function(si){if(si.diff>=-5&&si.diff<=10)cw.push(si);else if(si.diff>=-30&&si.diff<-5)wd.push(si);else if(si.diff>=-70&&si.diff<-30)bd.push(si)});
  var html='<p style="font-size:.8rem;color:#666;margin-top:10px">📌 <b>'+score+'分</b> · '+document.getElementById('province').selectedOptions[0].text+' · '+document.getElementById('subject').selectedOptions[0].text+'</p>';
  function r(arr,t,cls){if(!arr.length)return;html+='<div style="margin-top:12px"><h4 style="font-size:.8rem;margin-bottom:6px;color:#666">'+t+' ('+arr.length+'所)</h4>';arr.forEach(function(si){var sc=schools[si.id];html+='<div class="school-card"><div class="info"><h4>'+sc.n+' '+getTags(sc)+'</h4><div class="sub">'+sc.c+' · '+sc.t+'类 · 最低约'+si.score+'分</div></div><div class="score">'+(si.diff>=0?'+':'')+si.diff+'</div></div>'});html+='</div>'}
  r(cw,'🔴 冲一冲（-5~+10分）','cw');r(wd,'🟡 稳一稳（-30~-5分）','wd');r(bd,'🟢 保一保（-70~-30分）','bd');
  html+='<p style="font-size:.65rem;color:#999;margin-top:12px">* 数据为近三年最低录取分综合估算，以各省考试院公布为准</p>';
  document.getElementById('recResult').innerHTML=html;document.getElementById('recResult').className='result show';
}

function updateRankChart(){var score=parseInt(document.getElementById('rScore').value)||0,s=document.getElementById('rSubject').value;var sn=s==='wl'?'物理':'历史';var rank=Math.round(Math.exp((720-score)/80)*10000);var h='<div style="padding:16px;text-align:center"><p style="font-size:1.8rem;font-weight:800;color:var(--accent)">约 '+rank.toLocaleString()+' 名</p><p style="font-size:.8rem;color:#666">'+sn+'类 · '+score+'分</p><div class="chart">';for(var i=580;i<=700;i+=10){var rk=Math.round(Math.exp((720-i)/80)*10000);var ht=Math.max(3,Math.round(70-Math.log(rk)*5));h+='<div class="bar" style="height:'+ht+'px"><span class="val">'+i+'</span></div>'}h+='</div></div>';document.getElementById('rankChart').innerHTML=h}
