function updateRank(){
  var sc=parseInt(document.getElementById('score').value)||0,sj=document.getElementById('subj').value;
  if(!sc||sc<441&&sj==='wl'||sc<450&&sj==='ls'){document.getElementById('rankEst').innerHTML='';return}
  var tbl=rankTable[sj];var keys=Object.keys(tbl).map(Number).sort(function(a,b){return b-a});
  var lo=keys[keys.length-1],hi=keys[0];
  for(var i=0;i<keys.length;i++){if(sc<=keys[i]){hi=keys[i];lo=keys[i+1]||keys[keys.length-1];break}}
  var est=Math.round(tbl[hi]+(tbl[lo]-tbl[hi])*(hi-sc)/(hi-lo));
  var estStr=est>10000?(est/10000).toFixed(1)+'万':est.toLocaleString();
  var above=sj==='wl'?141000-est:25562-est;
  document.getElementById('rankEst').innerHTML='📊 估计全省第 <b>'+estStr+'</b> 名（超过约<b>'+Math.round(above/(sj==='wl'?141000:25562)*100)+'%</b>考生）';
}
